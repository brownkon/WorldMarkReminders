name: Zero-Server WorldMark Scheduler

on:
  schedule:
    # Run the daily booking check every day at 12:00 PM UTC (roughly 6 AM / 7 AM US timezone depending on DST)
    - cron: '0 12 * * *'
    
    # Run event discovery via quarterly schedules (Jan, Apr, Jul, Oct 1st at 00:00 UTC)
    - cron: '0 0 1 1,4,7,10 *'
    
  # Allow manual trigger from the GitHub Actions dashboard
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  run-scheduler:
    name: Run WorldMark Scheduler Tasks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Create Data Directory
        run: mkdir -p data

      - name: Run Daily Booking Check
        if: github.event.schedule == '0 12 * * *' || github.event_name == 'workflow_dispatch'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: npx ts-node src/tasks/daily-check.ts

      - name: Run AI Event Discovery
        if: github.event.schedule == '0 0 1 1,4,7,10 *' || github.event_name == 'workflow_dispatch'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: npx ts-node src/tasks/event-discovery.ts

      - name: Commit and Push Database Updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          # Only commit if there are changes to the data folder (SQLite DB or JSON files)
          git add data/
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-update database from scheduler action"
            git push origin main
          else
            echo "No database changes to commit."
          fi
